{% extends "base.html" %}

{% block title %}Create Team - Volleyball Live Scorer{% endblock %}

{% block content %}
<div class="page-header">
    <h2>Create New Team</h2>
    <p>Add a team to a tournament. Select a tournament to see existing teams.</p>
</div>

<div class="card">
    <form method="POST" action="{{ url_for('create_team') }}">
        <div class="form-group">
            <label for="tournament_id">Select Tournament</label>
            <select id="tournament_id" name="tournament_id" required onchange="updateTeamList()">
                <option value="">-- Select Tournament --</option>
                {% for tournament in tournaments %}
                <option value="{{ tournament.id }}">{{ tournament.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="team_name">Team Name</label>
            <input type="text" id="team_name" name="team_name" required placeholder="e.g., Eagles United">
        </div>

        <div class="score-grid">
            <div class="form-group">
                <label for="coach_name">Coach Name</label>
                <input type="text" id="coach_name" name="coach_name" placeholder="Coach's full name">
            </div>
            <div class="form-group">
                <label for="jersey_color">Jersey Color</label>
                <input type="text" id="jersey_color" name="jersey_color" placeholder="e.g., Blue & White">
            </div>
        </div>

        <div class="form-group">
            <label for="players">Number of Players</label>
            <input type="number" id="players" name="players" min="1" max="20" value="12" required>
        </div>

        <div class="controls">
            <button type="submit" class="btn btn-amber">Create Team</button>
            <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>

<div id="existing-teams-card" class="card" style="display: none;">
    <h3>Existing Teams in Tournament</h3>
    <div id="teams-list" class="space-y-2"></div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function updateTeamList() {
    const tournamentId = document.getElementById('tournament_id').value;
    const card = document.getElementById('existing-teams-card');
    const list = document.getElementById('teams-list');

    if (!tournamentId) {
        card.style.display = 'none';
        return;
    }

    fetch(`/api/tournament/${tournamentId}/teams`)
        .then(r => r.json())
        .then(teams => {
            card.style.display = 'block';
            if (teams.length === 0) {
                list.innerHTML = '<p style="color:#64748b; font-size:0.875rem;">No teams added yet. Be the first!</p>';
            } else {
                list.innerHTML = teams.map(t => `
                    <div style="display:flex; align-items:center; gap:0.75rem; padding:0.75rem 1rem; background:#090d14; border:1px solid #1e293b; border-radius:8px;">
                        <span style="color:#f59e0b; font-size:1rem;">🏐</span>
                        <span style="color:#f1f5f9; font-weight:700; font-size:0.9rem;">${t.name}</span>
                    </div>
                `).join('');
            }
        })
        .catch(e => console.error('Error loading teams:', e));
}

document.addEventListener('DOMContentLoaded', function() {
    if (document.getElementById('tournament_id').value) updateTeamList();
});
</script>
{% endblock %}
